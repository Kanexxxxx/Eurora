name: Deploy VPS

on:
  push:
    branches:
      - codex/prepare-prod-asaas
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST || vars.VPS_HOST }}
          username: ${{ secrets.VPS_USER || vars.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            APP_DIR="/var/www/eurora/eurora-love"
            BRANCH="codex/prepare-prod-asaas"

            cd "$APP_DIR"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git pull --ff-only origin "$BRANCH"

            mkdir -p /var/www/eurora/uploads
            chmod -R 755 /var/www/eurora/uploads

            npm ci
            npm run prisma:generate
            npx prisma db push
            npm run build

            if pm2 describe eurora-love >/dev/null 2>&1; then
              pm2 restart eurora-love --update-env
            else
              PORT=3000 pm2 start npm --name eurora-love -- run start:prod
            fi

            pm2 save
