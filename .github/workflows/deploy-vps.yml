name: Deploy VPS

on:
  push:
    branches:
      - codex/prepare-prod-asaas
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST || vars.VPS_HOST }}
          username: ${{ secrets.VPS_USER || vars.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            APP_DIR="/var/www/eurora/eurora-love"
            BRANCH="codex/prepare-prod-asaas"

            cd "$APP_DIR"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git clean -fd
            git reset --hard origin/"$BRANCH"

            mkdir -p /var/www/eurora/uploads
            chmod -R 755 /var/www/eurora/uploads

            rm -rf node_modules .next
            npm ci
            npm run prisma:generate
            npx prisma db push

            # Remove DB product links — catalog is managed via src/data/presentes.ts
            echo 'DELETE FROM "PresenteLink"; DELETE FROM "HiddenProduto";' | npx prisma db execute --stdin || true

            npm run build

            # Prepare standalone deployment
            cp .env .next/standalone/.env
            cp -r public .next/standalone/public
            cp -r .next/static .next/standalone/.next/static

            if pm2 describe eurora-love >/dev/null 2>&1; then
              PORT=4000 pm2 restart eurora-love --update-env
            else
              PORT=4000 pm2 start node --name eurora-love -- .next/standalone/server.js
            fi

            pm2 save
